# HTTP — редирект на HTTPS + certbot challenge
server {
    listen 80;
    server_name nativeheart.ru www.nativeheart.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — основной сайт
server {
    listen 443 ssl;
    server_name nativeheart.ru www.nativeheart.ru;

    ssl_certificate /etc/letsencrypt/live/nativeheart.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nativeheart.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 110m;

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API (проксируется через Next.js, но на всякий случай прямой доступ)
    location /api/backend/ {
        rewrite ^/api/backend/(.*) /api/$1 break;
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
